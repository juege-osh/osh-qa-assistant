server {
    listen 80;
    server_name _;

    location = / {
        return 302 /ai/;
    }

    location = /ai-manager {
        return 302 /ai/#/admin;
    }

    location /ai-manager/ {
        return 302 /ai/#/admin;
    }

    location = /ai-consumer {
        return 302 /ai/#/workspace/chat;
    }

    location /ai-consumer/ {
        return 302 /ai/#/workspace/chat;
    }

    location /ai/ {
        alias /usr/share/nginx/html/ai/;
        index index.html;
        try_files $uri $uri/ /ai/index.html;
    }

    location /pc/ {
        proxy_pass http://backstage-admin:8081/pc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /manager/ {
        proxy_pass http://qa-assistant-backend:9000/manager/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        client_max_body_size 200m;
    }

    location /auth/ {
        proxy_pass http://qa-assistant-backend:9000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        client_max_body_size 200m;
    }

    location /consumer/chat/connect {
        proxy_pass http://qa-assistant-backend:9000/consumer/chat/connect;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location /consumer/ {
        proxy_pass http://qa-assistant-backend:9000/consumer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        client_max_body_size 200m;
    }
}
