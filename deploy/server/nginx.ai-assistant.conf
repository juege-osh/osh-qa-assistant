server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /ai-manager/ {
        alias /usr/share/nginx/html/ai-manager/;
        index index.html;
        try_files $uri $uri/ /ai-manager/index.html;
    }

    location /ai-consumer/ {
        alias /usr/share/nginx/html/ai-consumer/;
        index index.html;
        try_files $uri $uri/ /ai-consumer/index.html;
    }

    location /pc/ {
        proxy_pass http://backstage-admin:8081/pc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /manager/ {
        proxy_pass http://ai-assistant-backend:9000/manager/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        client_max_body_size 200m;
    }

    location /consumer/chat/connect {
        proxy_pass http://ai-assistant-backend:9000/consumer/chat/connect;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location /consumer/ {
        proxy_pass http://ai-assistant-backend:9000/consumer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        client_max_body_size 200m;
    }
}
